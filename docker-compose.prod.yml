# Production-style stack: backend + frontend only (external Postgres, e.g. Neon).
# No local `db` service — set DATABASE_URL in `.env` or the host environment.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# HTTPS: terminate TLS in front of this stack; set ALLOWED_ORIGINS to your public SPA
# origin (https://...) and TRUST_PROXY=1 (default in production). See `.env.docker.example`.
#
# DATABASE_URL example (Neon):
#   postgresql://USER:PASSWORD@ep-xxxx.region.aws.neon.tech/neondb?sslmode=require

services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (e.g. Neon connection string)}
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
        VITE_USE_RELATIVE_API: "${VITE_USE_RELATIVE_API:-true}"
        VITE_BASE_PATH: "${VITE_BASE_PATH:-/}"
    container_name: safetyapp_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
