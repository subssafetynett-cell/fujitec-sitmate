# Auto-loaded by `docker compose` for local development (not used when Coolify passes `-f docker-compose.yaml` only).
# Adds Postgres and fixes DATABASE_URL host (`db` instead of `localhost` from .env).

services:
  db:
    image: postgres:15-alpine
    container_name: safetyapp_db
    restart: always
    environment:
      POSTGRES_USER: safetyuser
      POSTGRES_PASSWORD: safetypassword
      POSTGRES_DB: safetyapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyuser -d safetyapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      DATABASE_URL: postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    ports:
      - "8080:80"

volumes:
  postgres_data:
