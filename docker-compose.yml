# Stack: Postgres (local) + backend + frontend.
#
# Database URL
# ------------
# By default the backend uses the bundled Postgres service (`db`).
# For Neon (or any external Postgres), set DATABASE_URL in a root `.env` file
# (same file used by `env_file` on the backend service). Compose will substitute
# it here — do not commit real credentials.
#
# Example (Neon):
#   DATABASE_URL=postgresql://USER:PASSWORD@ep-xxxx.us-east-1.aws.neon.tech/neondb?sslmode=require
#
# Then run as usual:
#   docker compose up -d --build
#
# HTTPS: terminate TLS at your load balancer or host nginx, forward HTTP to :8080 / :4000.
# Set ALLOWED_ORIGINS and TRUST_PROXY in `.env` (see `.env.docker.example`). The SPA
# build uses VITE_USE_RELATIVE_API=true by default so the browser calls https://your-host/api.
#
# The local `db` container still runs unless you remove it; it is optional if you
# only use Neon — to save resources, use a deploy-specific compose or stop db:
#   docker compose stop db

services:
  db:
    image: postgres:15-alpine
    container_name: safetyapp_db
    restart: always
    environment:
      POSTGRES_USER: safetyuser
      POSTGRES_PASSWORD: safetypassword
      POSTGRES_DB: safetyapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyuser -d safetyapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Root `.env` DATABASE_URL overrides this default (Neon, RDS, etc.).
      DATABASE_URL: ${DATABASE_URL:-postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        # HTTPS deploy: set VITE_BACKEND_URL=https://api.yourdomain.com when not using relative /api.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
        VITE_USE_RELATIVE_API: "${VITE_USE_RELATIVE_API:-true}"
        VITE_BASE_PATH: "${VITE_BASE_PATH:-/}"
    container_name: safetyapp_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
