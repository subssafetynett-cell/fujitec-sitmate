services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    expose:
      - "4000"

    # Coolify injects DATABASE_URL, JWT_SECRET, APP_URL, etc. from the service env UI.
    # Root `.env` is optional (local dev); never commit real secrets.
    env_file:
      - path: .env
        required: false

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Do not default DATABASE_URL here — no bundled Postgres in this stack.
      # Set DATABASE_URL (Neon pooled URL) and JWT_SECRET in Coolify → backend → Environment.

    volumes:
      - ./backend/uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_USE_RELATIVE_API: "true"
        VITE_BASE_PATH: "/"

    container_name: safetyapp_frontend
    restart: always

    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      NGINX_ENVSUBST_FILTER: ^BACKEND_HOST$

    expose:
      - "80"

    depends_on:
      backend:
        condition: service_healthy

volumes: {}
