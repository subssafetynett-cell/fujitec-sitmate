services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    expose:
      - "4000"

    # Coolify: `docker compose --env-file /artifacts/.../.env` — vars must be referenced below.
    env_file:
      - path: .env
        required: false

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DASHBOARD_CACHE_TTL_SEC: ${DASHBOARD_CACHE_TTL_SEC:-60}
      # DIRECT_URL is derived from DATABASE_URL at runtime when not set in Coolify.

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - ./backend/uploads:/app/uploads

    # Health is for Coolify / dashboards — do NOT gate `compose up` on it.
    # Entrypoint runs migrations before listen(); Coolify's deploy container often
    # dies (exit 255) while waiting on service_healthy through long migrate/start.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_USE_RELATIVE_API: "true"
        VITE_BASE_PATH: "/"

    container_name: safetyapp_frontend
    restart: always

    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      NGINX_ENVSUBST_FILTER: ^BACKEND_HOST$

    expose:
      - "80"

    depends_on:
      backend:
        # service_started (not healthy): Coolify `compose up -d` must return quickly.
        # Nginx will 502 until /api/health passes; backend restart: always covers that.
        condition: service_started

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: safetyapp_redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes: {}
