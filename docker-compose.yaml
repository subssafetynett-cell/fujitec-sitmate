services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    expose:
      - "4000"

    # Coolify: `docker compose --env-file /artifacts/.../.env` — vars must be referenced below.
    env_file:
      - path: .env
        required: false

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # DIRECT_URL is derived from DATABASE_URL at runtime when not set in Coolify.

    volumes:
      - ./backend/uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 600s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_USE_RELATIVE_API: "true"
        VITE_BASE_PATH: "/"

    container_name: safetyapp_frontend
    restart: always

    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      NGINX_ENVSUBST_FILTER: ^BACKEND_HOST$

    expose:
      - "80"

    depends_on:
      backend:
        condition: service_healthy

volumes: {}
