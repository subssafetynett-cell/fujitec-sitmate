services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    expose:
      - "4000"

    env_file:
      - .env

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Coolify / Neon: set DATABASE_URL in env_file (pooled connection string from Neon dashboard).
      DATABASE_URL: ${DATABASE_URL:-postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # Local `docker compose up` auto-merges docker-compose.override.yml (APP_URL + NODE_ENV=development).

    volumes:
      - ./backend/uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_USE_RELATIVE_API: "true"
        VITE_BASE_PATH: "/"

    container_name: safetyapp_frontend
    restart: always

    environment:
      # Docker Compose service name for API proxy (nginx template). Override if your stack renames the backend service.
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      # Only substitute BACKEND_HOST in nginx.conf.template — do not strip nginx $variables via envsubst.
      NGINX_ENVSUBST_FILTER: ^BACKEND_HOST$

    expose:
      - "80"

    depends_on:
      backend:
        condition: service_healthy

volumes: {}
