services:
  backend:
    build: ./backend
    container_name: safetyapp_backend
    restart: always
    expose:
      - "4000"

    env_file:
      - .env

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Default matches bundled Postgres in docker-compose.local.yaml; override in .env for Neon/Coolify.
      DATABASE_URL: ${DATABASE_URL:-postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public}
      # Public SPA origin for password-reset and welcome emails (no trailing slash).
      APP_URL: ${APP_URL}
      BASE_URL: ${BASE_URL:-}

    volumes:
      - ./backend/uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_USE_RELATIVE_API: "true"
        VITE_BASE_PATH: "/"

    container_name: safetyapp_frontend
    restart: always

    expose:
      - "80"

    depends_on:
      backend:
        condition: service_healthy

volumes: {}
