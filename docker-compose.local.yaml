# Local development overlay — merge with docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml up -d --build
# Or use: ./scripts/docker-up.sh

services:
  db:
    image: postgres:15-alpine
    container_name: safetyapp_db
    restart: always
    environment:
      POSTGRES_USER: safetyuser
      POSTGRES_PASSWORD: safetypassword
      POSTGRES_DB: safetyapp_db
    ports:
      # 5434 avoids clashing with local Postgres (5432) and other tools on 5433.
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyuser -d safetyapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      DATABASE_URL: postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public
      APP_URL: ${APP_URL:-http://localhost:8080}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    ports:
      - "8080:80"

volumes:
  postgres_data:
